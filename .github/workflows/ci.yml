name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: rustfmt --check
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: test
        run: cargo test --workspace --locked

  docker:
    name: docker build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: trading-system:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: smoke-test binaries
        run: |
          docker run --rm trading-system:ci /usr/local/bin/ts-report --help
          docker run --rm trading-system:ci /usr/local/bin/ts-migrate --help
          docker run --rm trading-system:ci /usr/local/bin/ts-backtest --help
